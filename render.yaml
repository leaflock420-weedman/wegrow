# WeGrow by LeafLock — Node static server (wegrow.leaflock.com.au)
services:
  - type: web
    name: wegrow
    runtime: node
    plan: free
    repo: https://github.com/leaflock420-weedman/wegrow
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    domains:
      - wegrow.leaflock.com.au